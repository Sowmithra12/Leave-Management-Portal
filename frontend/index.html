<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Management Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-5">

    <div class="card shadow p-4 mx-auto login-card">

      <h2 class="text-center mb-4">
        Employee Leave Management Portal
      </h2>

      <h4 class="text-center mb-4">
        Employee Login
      </h4>

      <input type="text" id="username" class="form-control mb-3" placeholder="Enter Username">

      <input type="password" id="password" class="form-control mb-3" placeholder="Enter Password">

      <button class="btn btn-primary w-100" onclick="login()">
          Login
      </button>

      <div class="mt-3 text-center">
          <small>
              Employee Login:
              employee / 123
          </small>

          <br>

          <small>
              HR Login:
              admin / 123
          </small>
      </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
