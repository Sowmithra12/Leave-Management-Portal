<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand mb-0 h1">
        Leave Management Portal
    </span>

    <button class="btn btn-danger" onclick="logout()">
        Logout
    </button>
</nav>

<div class="container mt-5">

    <h2 class="mb-4">Employee Dashboard</h2>

    <!-- Statistics Cards -->
    <div class="row mb-4">

        <div class="col-md-4">
            <div class="card shadow p-3 text-center">
                <h5>Total Requests</h5>
                <h2 id="totalLeaves">0</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-3 text-center">
                <h5>Approved</h5>
                <h2 id="approvedLeaves">0</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-3 text-center">
                <h5>Pending</h5>
                <h2 id="pendingLeaves">0</h2>
            </div>
        </div>

    </div>

    <!-- Apply Leave Card -->
    <div class="card p-4 shadow">

        <h4>Apply Leave</h4>

        <input type="text" id="employeeName" class="form-control mb-3" placeholder="Employee Name">

        <select id="leaveType" class="form-control mb-3">
            <option>Sick Leave</option>
            <option>Casual Leave</option>
            <option>Vacation</option>
        </select>

        <label>From Date</label>
        <input type="date" id="fromDate" class="form-control mb-3">

        <label>To Date</label>
        <input type="date" id="toDate" class="form-control mb-3">

        <textarea id="reason" class="form-control mb-3" placeholder="Reason"></textarea>

        <button class="btn btn-success" onclick="applyLeave()">
            Apply Leave
        </button>

    </div>

    <!-- Leave History -->
    <div class="card p-4 shadow mt-5">

        <h4>Leave History</h4>

        <table class="table table-bordered mt-3">

            <thead>
                <tr>
                    <th>Employee</th>
                    <th>Type</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody id="leaveTable">
            </tbody>

        </table>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
